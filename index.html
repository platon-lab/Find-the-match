<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Знайди пару</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@600;700;800&display=swap');

  :root {
    --bg: #0f0c29;
    --bg2: #1a1540;
    --card-back: #2a2060;
    --card-border: #5a4fcf;
    --gold: #ffd700;
    --accent: #ff6ec7;
    --accent2: #00e5ff;
    --green: #00e676;
    --red: #ff5252;
    --text: #f0eaff;
    --shadow: 0 4px 24px rgba(80,60,200,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    touch-action: manipulation;
  }

  body {
    background: radial-gradient(ellipse at 20% 20%, #2d1b6e 0%, #0f0c29 50%, #0a1628 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .screen {
    display: none;
    width: 100%; max-width: 480px;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    position: relative;
  }
  .screen.active { display: flex; }

  /* STARS BG */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* LOGO */
  .logo {
    font-family: 'Baloo 2', cursive;
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1.1;
    filter: drop-shadow(0 0 16px rgba(255,110,199,0.5));
    z-index: 1;
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 0.85rem;
    color: rgba(200,180,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    z-index: 1;
    margin-bottom: 32px;
  }

  /* BUTTONS */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; max-width: 280px;
    padding: 16px 24px;
    border-radius: 20px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    position: relative;
    z-index: 1;
    letter-spacing: 0.5px;
    margin: 6px 0;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: linear-gradient(135deg, #7c4dff, #e040fb);
    color: white;
    box-shadow: 0 6px 20px rgba(124,77,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-primary:hover { box-shadow: 0 8px 28px rgba(124,77,255,0.7), inset 0 1px 0 rgba(255,255,255,0.2); }
  .btn-secondary {
    background: linear-gradient(135deg, #00bcd4, #00e5ff);
    color: #0a1628;
    box-shadow: 0 6px 20px rgba(0,229,255,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-small {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 0.9rem;
    padding: 10px 20px;
    max-width: 180px;
    backdrop-filter: blur(10px);
  }
  .btn-small:hover { background: rgba(255,255,255,0.18); }
  .btn-back {
    position: absolute; top: 20px; left: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 0.85rem;
    max-width: 80px;
    z-index: 10;
  }
  .btn-restart {
    background: linear-gradient(135deg, #ff6ec7, #ff5252);
    color: white;
    font-size: 0.85rem;
    padding: 8px 16px;
    max-width: 120px;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(255,82,82,0.4);
  }

  /* HERO SELECT */
  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    margin-bottom: 16px;
    z-index: 1;
    text-shadow: 0 0 12px rgba(255,215,0,0.5);
  }

  .heroes-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    z-index: 1;
    margin-bottom: 20px;
  }

  .hero-option {
    width: 80px; height: 80px;
    border-radius: 16px;
    border: 3px solid transparent;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.2s;
    position: relative;
    background: var(--card-back);
    display: flex; align-items: center; justify-content: center;
  }
  .hero-option img {
    width: 70px; height: 70px;
    object-fit: contain;
    pointer-events: none;
  }
  .hero-option.selected {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(255,215,0,0.6);
    transform: scale(1.08);
  }
  .hero-option:hover { transform: scale(1.05); }
  .hero-option .hero-name {
    position: absolute; bottom: 2px; left: 0; right: 0;
    font-size: 0.55rem;
    text-align: center;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.5);
    padding: 1px 2px;
    border-radius: 0 0 12px 12px;
  }

  /* GAME SCREEN */
  #screen-game {
    padding: 8px 10px;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 8px;
    z-index: 1;
    gap: 6px;
  }

  .score-panel {
    display: flex;
    gap: 8px;
    flex: 1;
    justify-content: center;
  }

  .score-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 6px 12px;
    text-align: center;
    min-width: 70px;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .score-card.active-turn {
    background: rgba(124,77,255,0.25);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(255,110,199,0.3);
  }
  .score-card.active-turn::after {
    content: '▼';
    position: absolute;
    top: -2px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: var(--accent);
  }
  .score-hero {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin-bottom: 2px;
  }
  .score-hero-img {
    width: 22px; height: 22px;
    object-fit: contain;
    border-radius: 50%;
  }
  .score-label {
    font-size: 0.65rem;
    color: rgba(200,180,255,0.7);
    font-weight: 700;
  }
  .score-num {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .turn-label {
    font-size: 0.7rem;
    color: var(--accent2);
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    z-index: 1;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-height: 16px;
  }

  /* GRID */
  .grid {
    display: grid;
    gap: 8px;
    width: 100%;
    max-width: 460px;
    z-index: 1;
  }
  .grid-4x4 { grid-template-columns: repeat(4, 1fr); }
  .grid-6x6 { grid-template-columns: repeat(6, 1fr); }

  .card {
    aspect-ratio: 1;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    user-select: none;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { cursor: default; }
  .card.matched .card-front { box-shadow: 0 0 16px rgba(0,230,118,0.6); border-color: var(--green); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #2a2060, #1a1040);
    border: 2px solid rgba(90,79,207,0.5);
    box-shadow: var(--shadow);
  }
  .card-back::before {
    content: '✦';
    font-size: 1.5rem;
    color: rgba(90,79,207,0.6);
  }
  .card-back::after {
    content: '';
    position: absolute; inset: 4px;
    border-radius: 8px;
    border: 1px solid rgba(90,79,207,0.25);
  }

  .card-front {
    background: #1e1850;
    border: 2px solid rgba(90,79,207,0.4);
    transform: rotateY(180deg);
    box-shadow: var(--shadow);
  }
  .card-front img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    pointer-events: none;
  }

  /* WINNER SCREEN */
  .winner-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    backdrop-filter: blur(16px);
    z-index: 1;
    width: 100%;
    max-width: 340px;
  }

  .winner-emoji {
    font-size: 4rem;
    margin-bottom: 8px;
    animation: pop 0.5s cubic-bezier(.4,0,.2,1);
  }
  @keyframes pop {
    0% { transform: scale(0); }
    80% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .winner-title {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .winner-name {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent2);
    margin-bottom: 20px;
  }

  .score-breakdown {
    display: flex; gap: 16px; justify-content: center;
    margin-bottom: 24px;
  }
  .sb-item {
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    padding: 12px 20px;
    text-align: center;
  }
  .sb-name { font-size: 0.75rem; color: rgba(200,180,255,0.7); margin-bottom: 4px; }
  .sb-score { font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800; color: var(--gold); }

  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: fall var(--dur, 2s) ease-in var(--delay, 0s) forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* SIZE SELECT */
  .size-options {
    display: flex; gap: 12px;
    z-index: 1;
    margin-bottom: 16px;
  }
  .size-btn {
    flex: 1;
    max-width: 120px;
    padding: 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.12);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .size-btn.selected, .size-btn:hover {
    background: rgba(124,77,255,0.3);
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(255,110,199,0.3);
  }

  /* P2 name badge */
  .player-badge {
    font-size: 0.7rem;
    font-weight: 800;
    color: rgba(200,180,255,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    z-index: 1;
    text-align: center;
  }

  /* hint strip */
  .hint-strip {
    background: rgba(255,110,199,0.12);
    border: 1px solid rgba(255,110,199,0.2);
    border-radius: 10px;
    padding: 4px 12px;
    font-size: 0.7rem;
    color: var(--accent);
    text-align: center;
    z-index: 1;
    margin-bottom: 6px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin: 12px auto 20px;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- MAIN MENU -->
<div class="screen active" id="screen-menu">
  <div class="logo">🃏 Знайди Пару</div>
  <div class="logo-sub">Memory Game</div>
  <div class="divider"></div>
  <button class="btn btn-primary" onclick="startSetup('bot')">🤖 Грати проти бота</button>
  <button class="btn btn-secondary" onclick="startSetup('2p')" style="margin-top:8px">👥 2 гравця</button>
</div>

<!-- SETUP: vs BOT -->
<div class="screen" id="screen-setup-bot">
  <button class="btn btn-back" onclick="goMenu()">← Назад</button>
  <div class="logo" style="font-size:1.8rem; margin-top:40px; margin-bottom:4px">Vs 🤖 Бот</div>
  <div class="divider"></div>
  <div class="section-title">Обери свого героя</div>
  <div class="heroes-grid" id="heroes-bot"></div>
  <div class="section-title" style="margin-top:4px">Розмір поля</div>
  <div class="size-options">
    <div class="size-btn selected" onclick="selectSize(this,'4x4')" data-size="4x4">4×4</div>
    <div class="size-btn" onclick="selectSize(this,'6x6')" data-size="6x6">6×6</div>
  </div>
  <button class="btn btn-primary" onclick="startGameBot()">🎮 Почати гру</button>
</div>

<!-- SETUP: 2 PLAYERS -->
<div class="screen" id="screen-setup-2p">
  <button class="btn btn-back" onclick="goMenu()">← Назад</button>
  <div class="logo" style="font-size:1.8rem; margin-top:40px; margin-bottom:4px">👥 2 Гравця</div>
  <div class="divider"></div>
  <div class="player-badge">🎮 Гравець 1 — обери героя</div>
  <div class="heroes-grid" id="heroes-p1"></div>
  <div class="player-badge" style="margin-top:8px">🎮 Гравець 2 — обери героя</div>
  <div class="heroes-grid" id="heroes-p2"></div>
  <div class="section-title" style="margin-top:4px">Розмір поля</div>
  <div class="size-options">
    <div class="size-btn selected" onclick="selectSize2(this,'4x4')" data-size="4x4">4×4</div>
    <div class="size-btn" onclick="selectSize2(this,'6x6')" data-size="6x6">6×6</div>
  </div>
  <button class="btn btn-secondary" onclick="startGame2P()">🎮 Почати гру</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <button class="btn btn-restart" onclick="restartGame()">↺ Рестарт</button>
    <div class="score-panel">
      <div class="score-card active-turn" id="sc0">
        <div class="score-hero">
          <img class="score-hero-img" id="sc0-img" src="" alt="">
          <span class="score-label" id="sc0-label">P1</span>
        </div>
        <div class="score-num" id="sc0-num">0</div>
      </div>
      <div class="score-card" id="sc1">
        <div class="score-hero">
          <img class="score-hero-img" id="sc1-img" src="" alt="">
          <span class="score-label" id="sc1-label">P2</span>
        </div>
        <div class="score-num" id="sc1-num">0</div>
      </div>
    </div>
  </div>
  <div class="turn-label" id="turn-label">Хід Гравця 1</div>
  <div class="hint-strip" id="bot-hint" style="display:none">🤖 Бот думає...</div>
  <div class="grid" id="game-grid"></div>
</div>

<!-- WINNER SCREEN -->
<div class="screen" id="screen-winner">
  <div class="winner-box">
    <div class="winner-emoji" id="win-emoji">🏆</div>
    <div class="winner-title">Перемога!</div>
    <div class="winner-name" id="win-name">Гравець 1</div>
    <div class="score-breakdown">
      <div class="sb-item">
        <div class="sb-name" id="win-p1-label">P1</div>
        <div class="sb-score" id="win-p1-score">0</div>
      </div>
      <div class="sb-item" id="win-p2-box">
        <div class="sb-name" id="win-p2-label">P2</div>
        <div class="sb-score" id="win-p2-score">0</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="goMenu()" style="max-width:200px; margin:0 auto 8px">🏠 Головне меню</button>
    <button class="btn btn-small" onclick="restartGame()" style="margin:0 auto">↺ Грати знову</button>
  </div>
  <div class="confetti" id="confetti"></div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────
const CHARS = [
  { name: 'Tito',    file: 'Tito.png' },
  { name: 'Smartik', file: 'Smartik.png' },
  { name: 'Junior',  file: 'Junior.png' },
  { name: 'Fil',     file: 'Fil.png' },
  { name: 'Milka',   file: 'Milka.png' },
];

// Filter variants per character (each produces a visually distinct look)
const VARIANTS = [
  { label: 'normal',   filter: 'none' },
  { label: 'blue',     filter: 'hue-rotate(200deg) saturate(1.8) brightness(1.1)' },
  { label: 'green',    filter: 'hue-rotate(100deg) saturate(2) brightness(1.05)' },
  { label: 'red',      filter: 'hue-rotate(320deg) saturate(2.2) brightness(1.1)' },
  { label: 'gold',     filter: 'sepia(0.8) saturate(2.5) brightness(1.2)' },
  { label: 'purple',   filter: 'hue-rotate(260deg) saturate(2) brightness(0.95)' },
  { label: 'dark',     filter: 'brightness(0.5) contrast(1.3)' },
  { label: 'neon',     filter: 'contrast(1.5) saturate(3) brightness(1.15)' },
  { label: 'ice',      filter: 'hue-rotate(170deg) saturate(1.4) brightness(1.3) contrast(1.1)' },
];

// ─── STATE ───────────────────────────────────────────────────────
let gameMode = 'bot'; // 'bot' | '2p'
let gridSize = '4x4';
let gridSize2p = '4x4';
let selectedHeroBot = null;
let selectedHeroP1 = null;
let selectedHeroP2 = null;

let cards = [];
let flipped = [];
let matched = [];
let scores = [0, 0];
let currentPlayer = 0;
let canFlip = true;
let botMemory = {};
let gameCards = [];
let botHeroIdx = null;
let lastRestartMode = null;

// ─── STARS ───────────────────────────────────────────────────────
(function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    c.appendChild(s);
  }
})();

// ─── SCREENS ─────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goMenu() { showScreen('screen-menu'); }

function startSetup(mode) {
  gameMode = mode;
  if (mode === 'bot') {
    renderHeroSelect('heroes-bot', 'bot');
    // reset size
    document.querySelectorAll('#screen-setup-bot .size-btn').forEach((b,i) => {
      b.classList.toggle('selected', i===0);
    });
    gridSize = '4x4';
    showScreen('screen-setup-bot');
  } else {
    renderHeroSelect('heroes-p1', 'p1');
    renderHeroSelect('heroes-p2', 'p2');
    document.querySelectorAll('#screen-setup-2p .size-btn').forEach((b,i) => {
      b.classList.toggle('selected', i===0);
    });
    gridSize2p = '4x4';
    showScreen('screen-setup-2p');
  }
}

// ─── HERO SELECT ─────────────────────────────────────────────────
function renderHeroSelect(containerId, who) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const div = document.createElement('div');
    div.className = 'hero-option';
    div.onclick = () => selectHero(who, idx, containerId);
    div.id = `hero-opt-${who}-${idx}`;
    const img = document.createElement('img');
    img.src = ch.file;
    img.alt = ch.name;
    const nm = document.createElement('div');
    nm.className = 'hero-name';
    nm.textContent = ch.name;
    div.appendChild(img);
    div.appendChild(nm);
    c.appendChild(div);
  });
}

function selectHero(who, idx, containerId) {
  document.querySelectorAll(`#${containerId} .hero-option`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`hero-opt-${who}-${idx}`).classList.add('selected');
  if (who === 'bot') selectedHeroBot = idx;
  else if (who === 'p1') selectedHeroP1 = idx;
  else selectedHeroP2 = idx;
}

function selectSize(btn, size) {
  document.querySelectorAll('#screen-setup-bot .size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  gridSize = size;
}
function selectSize2(btn, size) {
  document.querySelectorAll('#screen-setup-2p .size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  gridSize2p = size;
}

// ─── START GAME ──────────────────────────────────────────────────
function startGameBot() {
  if (selectedHeroBot === null) { alert('Обери свого героя!'); return; }
  // bot gets random different hero
  let botIdx;
  do { botIdx = Math.floor(Math.random() * CHARS.length); } while (botIdx === selectedHeroBot);
  botHeroIdx = botIdx;
  lastRestartMode = 'bot';
  initGame('bot', gridSize, selectedHeroBot, botIdx);
}

function startGame2P() {
  if (selectedHeroP1 === null) { alert('Гравець 1 — обери героя!'); return; }
  if (selectedHeroP2 === null) { alert('Гравець 2 — обери героя!'); return; }
  lastRestartMode = '2p';
  initGame('2p', gridSize2p, selectedHeroP1, selectedHeroP2);
}

function initGame(mode, size, hero0, hero1) {
  gameMode = mode;
  scores = [0, 0];
  currentPlayer = 0;
  flipped = [];
  matched = [];
  canFlip = true;
  botMemory = {};
  gameCards = [];

  const dim = size === '6x6' ? 6 : 4;
  const total = dim * dim;
  const pairCount = total / 2;

  // Build pairs: cycle through CHARS × VARIANTS
  const allPairs = [];
  for (let ci = 0; ci < CHARS.length; ci++) {
    for (let vi = 0; vi < VARIANTS.length; vi++) {
      allPairs.push({ charIdx: ci, variantIdx: vi });
    }
  }
  // shuffle and pick pairCount
  shuffle(allPairs);
  const chosen = allPairs.slice(0, pairCount);
  let deck = [];
  chosen.forEach((p, i) => {
    deck.push({ id: i * 2,     pairId: i, charIdx: p.charIdx, variantIdx: p.variantIdx });
    deck.push({ id: i * 2 + 1, pairId: i, charIdx: p.charIdx, variantIdx: p.variantIdx });
  });
  shuffle(deck);
  gameCards = deck;

  // Update score UI heroes
  updateScoreUI(mode, hero0, hero1);
  updateTurnLabel();

  // Build grid
  const grid = document.getElementById('game-grid');
  grid.className = `grid grid-${size}`;
  grid.innerHTML = '';

  deck.forEach((card, idx) => {
    const ch = CHARS[card.charIdx];
    const v  = VARIANTS[card.variantIdx];
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;

    const back = document.createElement('div');
    back.className = 'card-face card-back';

    const front = document.createElement('div');
    front.className = 'card-face card-front';
    const img = document.createElement('img');
    img.src = ch.file;
    img.alt = ch.name;
    img.style.filter = v.filter;
    front.appendChild(img);

    el.appendChild(back);
    el.appendChild(front);
    el.addEventListener('click', () => onCardClick(idx));
    grid.appendChild(el);
  });

  document.getElementById('bot-hint').style.display = 'none';
  showScreen('screen-game');
}

function updateScoreUI(mode, hero0, hero1) {
  const ch0 = CHARS[hero0];
  const ch1 = CHARS[hero1];
  const img0 = document.getElementById('sc0-img');
  const img1 = document.getElementById('sc1-img');
  img0.src = ch0.file; img0.alt = ch0.name;
  img1.src = ch1.file; img1.alt = ch1.name;
  document.getElementById('sc0-label').textContent = mode === 'bot' ? 'Ти' : 'P1';
  document.getElementById('sc1-label').textContent = mode === 'bot' ? 'Бот' : 'P2';
  document.getElementById('sc0-num').textContent = '0';
  document.getElementById('sc1-num').textContent = '0';
  document.getElementById('sc0').classList.add('active-turn');
  document.getElementById('sc1').classList.remove('active-turn');
}

function updateTurnLabel() {
  const lbl = document.getElementById('turn-label');
  if (gameMode === 'bot') {
    lbl.textContent = currentPlayer === 0 ? '🎮 Твій хід' : '🤖 Хід бота';
  } else {
    lbl.textContent = `🎮 Хід Гравця ${currentPlayer + 1}`;
  }
  document.getElementById('sc0').classList.toggle('active-turn', currentPlayer === 0);
  document.getElementById('sc1').classList.toggle('active-turn', currentPlayer === 1);
}

// ─── CARD CLICK ──────────────────────────────────────────────────
function onCardClick(idx) {
  if (!canFlip) return;
  if (gameMode === 'bot' && currentPlayer === 1) return; // bot's turn
  if (matched.includes(idx)) return;
  if (flipped.includes(idx)) return;
  if (flipped.length >= 2) return;
  flipCard(idx);
}

function flipCard(idx) {
  flipped.push(idx);
  const el = document.querySelector(`.card[data-idx="${idx}"]`);
  el.classList.add('flipped');

  if (flipped.length === 2) {
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  const ca = gameCards[a], cb = gameCards[b];
  const isMatch = ca.pairId === cb.pairId;

  // Bot memory
  [a, b].forEach(idx => {
    botMemory[idx] = { pairId: gameCards[idx].pairId };
  });

  if (isMatch) {
    matched.push(a, b);
    const el1 = document.querySelector(`.card[data-idx="${a}"]`);
    const el2 = document.querySelector(`.card[data-idx="${b}"]`);
    el1.classList.add('matched');
    el2.classList.add('matched');
    scores[currentPlayer]++;
    document.getElementById(`sc${currentPlayer}-num`).textContent = scores[currentPlayer];
    flipped = [];
    canFlip = true;
    if (matched.length === gameCards.length) {
      setTimeout(showWinner, 600);
      return;
    }
    if (gameMode === 'bot' && currentPlayer === 1) {
      setTimeout(botTurn, 900);
    }
  } else {
    setTimeout(() => {
      [a, b].forEach(idx => {
        document.querySelector(`.card[data-idx="${idx}"]`).classList.remove('flipped');
      });
      flipped = [];
      switchPlayer();
    }, 900);
  }
}

function switchPlayer() {
  currentPlayer = currentPlayer === 0 ? 1 : 0;
  canFlip = true;
  updateTurnLabel();
  if (gameMode === 'bot' && currentPlayer === 1) {
    setTimeout(botTurn, 500);
  }
}

// ─── BOT ─────────────────────────────────────────────────────────
function botTurn() {
  if (matched.length === gameCards.length) return;
  document.getElementById('bot-hint').style.display = 'block';
  document.getElementById('bot-hint').textContent = '🤖 Бот думає...';

  setTimeout(() => {
    if (matched.length === gameCards.length) return;
    const unmatched = gameCards.map((c, i) => i).filter(i => !matched.includes(i));

    // Try to find known pair
    let found = null;
    const knownPairs = {};
    for (const [idxStr, data] of Object.entries(botMemory)) {
      const idx = parseInt(idxStr);
      if (matched.includes(idx)) continue;
      if (!knownPairs[data.pairId]) knownPairs[data.pairId] = [];
      knownPairs[data.pairId].push(idx);
    }
    for (const [pid, idxs] of Object.entries(knownPairs)) {
      if (idxs.length >= 2) { found = [idxs[0], idxs[1]]; break; }
    }

    if (found) {
      // Bot found a pair in memory!
      document.getElementById('bot-hint').textContent = '🤖 Знайшов пару!';
      canFlip = true;
      flipCard(found[0]);
      setTimeout(() => {
        canFlip = true;
        flipCard(found[1]);
        document.getElementById('bot-hint').style.display = 'none';
      }, 600);
    } else {
      // Pick random unknown card
      const unknown = unmatched.filter(i => !botMemory[i]);
      const pool = unknown.length > 0 ? unknown : unmatched;
      const first = pool[Math.floor(Math.random() * pool.length)];
      canFlip = true;
      flipCard(first);
      setTimeout(() => {
        document.getElementById('bot-hint').style.display = 'none';
        // Try to match with memory
        const pairId = gameCards[first].pairId;
        let secondChoice = null;
        for (const [idxStr, data] of Object.entries(botMemory)) {
          const idx = parseInt(idxStr);
          if (idx !== first && data.pairId === pairId && !matched.includes(idx)) {
            secondChoice = idx; break;
          }
        }
        if (!secondChoice) {
          // random second
          const remaining = unmatched.filter(i => i !== first && !flipped.includes(i));
          secondChoice = remaining[Math.floor(Math.random() * remaining.length)];
        }
        if (secondChoice !== undefined && secondChoice !== null) {
          canFlip = true;
          flipCard(secondChoice);
        }
      }, 700);
    }
  }, 800);
}

// ─── WINNER ──────────────────────────────────────────────────────
function showWinner() {
  const [s0, s1] = scores;
  let winnerName, emoji;
  if (s0 === s1) {
    winnerName = '🤝 Нічия!';
    emoji = '🤝';
    document.getElementById('winner-title') && (document.querySelector('.winner-title').textContent = 'Нічия!');
  } else if (s0 > s1) {
    winnerName = gameMode === 'bot' ? '🎉 Ти виграв!' : '🎉 Гравець 1';
    emoji = '🏆';
  } else {
    winnerName = gameMode === 'bot' ? '🤖 Бот виграв!' : '🎉 Гравець 2';
    emoji = gameMode === 'bot' ? '🤖' : '🏆';
  }
  document.getElementById('win-emoji').textContent = emoji;
  document.getElementById('win-name').textContent = winnerName;
  document.getElementById('win-p1-label').textContent = gameMode === 'bot' ? 'Ти' : 'P1';
  document.getElementById('win-p2-label').textContent = gameMode === 'bot' ? 'Бот' : 'P2';
  document.getElementById('win-p1-score').textContent = s0;
  document.getElementById('win-p2-score').textContent = s1;
  launchConfetti();
  showScreen('screen-winner');
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#ffd700','#ff6ec7','#00e5ff','#00e676','#ff5252','#b388ff'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      --dur: ${(Math.random()*1.5+1.5).toFixed(1)}s;
      --delay: ${(Math.random()*1.5).toFixed(1)}s;
      width: ${Math.random()*8+4}px;
      height: ${Math.random()*8+4}px;
      border-radius: ${Math.random()>0.5?'50%':'3px'};
    `;
    c.appendChild(p);
  }
}

// ─── RESTART ─────────────────────────────────────────────────────
function restartGame() {
  if (lastRestartMode === 'bot') {
    let botIdx;
    do { botIdx = Math.floor(Math.random() * CHARS.length); } while (botIdx === selectedHeroBot);
    botHeroIdx = botIdx;
    initGame('bot', gridSize, selectedHeroBot, botIdx);
  } else {
    initGame('2p', gridSize2p, selectedHeroP1, selectedHeroP2);
  }
}

// ─── UTILS ───────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
